# H2 Database Configuration
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration - Use create-drop for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop

# Flyway - DISABLE for H2 tests
spring.flyway.enabled=false

# Security
spring.security.user.name=testuser
spring.security.user.password=testpass

# Logging
logging.level.org.springframework.test=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.tezzasolutions.lendingapp=DEBUG

# Test configuration
spring.main.allow-bean-definition-overriding=true