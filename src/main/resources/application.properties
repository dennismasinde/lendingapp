spring.application.name=lendingapi
server.port=8088

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5431/lendingdb
spring.datasource.username=lendinguser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Validation
spring.mvc.validation.enabled=true

# Logging
logging.level.com.tezzasolutions.lendingapp=DEBUG
logging.level.org.hibernate.SQL=DEBUG