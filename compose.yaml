services:
  postgres:
    image: postgres:17
    container_name: lending-postgres

    environment:
      POSTGRES_DB: lendingdb
      POSTGRES_USER: lendinguser
      POSTGRES_PASSWORD: secret

    ports:
      - "5431:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lendinguser" ]
      interval: 10s
      timeout: 5s
      retries: 5


  lending-api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: lending-api

    depends_on:

      postgres:
        condition: service_healthy

    ports:
      - "8088:8088"

    environment:

      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lendingdb
      SPRING_DATASOURCE_USERNAME: lendinguser
      SPRING_DATASOURCE_PASSWORD: secret

      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres-data: