groups:

  # ==============================================================================
  # Infrastructure Alerts
  # ==============================================================================
  - name: infrastructure.rules
    rules:

      - alert: LendingApiDown
        expr: up{job="lending-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: lending-api
        annotations:
          summary: "Lending API is down"
          description: "Prometheus has not been able to scrape the Lending API for more than 1 minute."

      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter is unreachable."

      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target missing"
          description: "Target {{ $labels.job }} has been down for more than 5 minutes."

  # ==============================================================================
  # JVM Alerts
  # ==============================================================================
  - name: jvm.rules
    rules:

      - alert: HighHeapUsage
        expr: |
          (
            sum(jvm_memory_used_bytes{area="heap"})
            /
            sum(jvm_memory_max_bytes{area="heap"})
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "High JVM heap usage"
          description: "Heap usage has exceeded 85% for 5 minutes."

      - alert: CriticalHeapUsage
        expr: |
          (
            sum(jvm_memory_used_bytes{area="heap"})
            /
            sum(jvm_memory_max_bytes{area="heap"})
          ) > 0.95
        for: 2m
        labels:
          severity: critical
          service: lending-api
        annotations:
          summary: "Critical JVM heap usage"
          description: "Heap usage has exceeded 95% — OOM risk imminent."

      - alert: TooManyThreads
        expr: jvm_threads_live_threads > 300
        for: 5m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "High thread count"
          description: "Live JVM threads exceed 300 for 5 minutes."

      - alert: HighCpuUsage
        expr: system_cpu_usage > 0.90
        for: 5m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "High CPU usage"
          description: "CPU utilization is above 90% for 5 minutes."

      - alert: LongGcPause
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "Long garbage collection pause"
          description: "GC pause time rate exceeds 0.5s/s over 5 minutes."

  # ==============================================================================
  # HTTP / API Alerts
  # ==============================================================================
  - name: api.rules
    rules:

      - alert: High5xxErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          service: lending-api
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests are returning server errors over 5 minutes."

      - alert: SlowApiResponses
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "Slow API responses"
          description: "95th percentile response time exceeds 2 seconds."

      - alert: NoTrafficDetected
        expr: |
          rate(http_server_requests_seconds_count[5m]) == 0
        for: 15m
        labels:
          severity: warning
          service: lending-api
        annotations:
          summary: "No HTTP traffic"
          description: "No incoming HTTP requests detected for 15 minutes."

  # ==============================================================================
  # PostgreSQL Alerts
  # ==============================================================================
  - name: postgres.rules
    rules:

      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Too many database connections"
          description: "Database connections exceed 80 for 5 minutes (HikariCP default pool is 10 — investigate leaks)."

      - alert: DatabaseDeadlocks
        expr: increase(pg_stat_database_deadlocks[5m]) > 0
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "Database deadlocks detected"
          description: "One or more deadlocks occurred in the last 5 minutes."

      - alert: LongRunningTransaction
        expr: pg_stat_activity_max_tx_duration > 300
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Long running transaction"
          description: "A transaction has been running for more than 5 minutes."
