name: STADI CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  security-events: write

jobs:

  build-test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: lendingdb
          POSTGRES_USER: lendinguser
          POSTGRES_PASSWORD: secret

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U lendingdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_PROFILES_ACTIVE: test

      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/lendingdb
      SPRING_DATASOURCE_USERNAME: lendinguser
      SPRING_DATASOURCE_PASSWORD: secret

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify Project
        run: mvn -B clean verify

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload JaCoCo Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Build Docker Image
        run: |
          docker build \
          -t lending-api:${{ github.sha }} .

      - name: Start Docker Container
        run: |
          docker run -d \
            --name lending-api \
            -p 8080:8080 \
            lending-api:${{ github.sha }}

      - name: Wait for Startup
        run: sleep 30

      - name: Application Logs
        if: always()
        run: docker logs lending-api

      - name: Stop Container
        if: always()
        run: docker rm -f lending-api