name: LENDING CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build Application
        run: mvn -B clean package -DskipTests

      - name: Build Docker Image
        run: |
          docker build \
            -t lending-api:${{ github.sha }} .

      - name: Start Docker Container
        run: |
          docker run -d \
            --name lending-api \
            -p 8088:8088 \
            lending-api:${{ github.sha }}

      - name: Wait for Startup
        run: sleep 30

      - name: Show Application Logs
        if: always()
        run: docker logs lending-api

      - name: Verify Application Started
        run: |
          docker logs lending-api | grep "Started LendingappApplication"

      - name: Stop Container
        if: always()
        run: docker rm -f lending-api